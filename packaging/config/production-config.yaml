version: 0.7.0
_sections:
  Server:
    description: HTTP server bind, TLS termination, deployment mode
    icon: bi-server
    order: 1
  HAProxy:
    description: HAProxy paths and reload behaviour
    icon: bi-hdd-network
    order: 2
  Paths:
    description: Filesystem paths for runtime state, data, and binaries
    icon: bi-folder2-open
    order: 3
  Certificates:
    description: Let's Encrypt renewal, certbot, BYO certs, trusted CAs / CRLs
    icon: bi-shield-lock
    order: 4
  Security:
    description: JWT, API keys, CSRF, helmet headers
    icon: bi-shield-check
    order: 5
  CORS:
    description: Cross-origin request whitelist
    icon: bi-globe
    order: 6
  Rate Limiting:
    description: Tiered request rate limits
    icon: bi-speedometer
    order: 7
  Logging:
    description: Log level, format, destination
    icon: bi-file-text
    order: 8
  GeoIP:
    description: GeoIP database and fallback provider
    icon: bi-globe-americas
    order: 9
  Authentication:
    description: Authentication strategy
    icon: bi-key
    order: 10
  Internationalization:
    description: Locale auto-detection and override
    icon: bi-translate
    order: 11
mode:
  type: select
  value: standalone
  options:
    - homeassistant
    - standalone
  description: |
    Deployment surface. homeassistant: trust supervisor proxy, read
    X-Ingress-Path and X-Remote-User-* headers, no local auth.
    standalone: terminate own TLS, run setup-token + session + API key auth.
  section: Server
  subsection: Mode
  order: 1
  required: true
server:
  host:
    type: host
    value: 0.0.0.0
    description: Network interface to bind. Use 127.0.0.1 to expose only locally.
    section: Server
    subsection: Bind
    order: 1
    required: true
  port:
    type: integer
    value: 8099
    description: TCP port for the management UI and API.
    section: Server
    subsection: Bind
    order: 2
    required: true
    validation:
      min: 1
      max: 65535
  trustProxy:
    type: array
    value: []
    description: >
      Trusted upstream proxies (CIDR list, or
      "loopback"/"linklocal"/"uniquelocal").

      Required for X-Forwarded-* and HA ingress headers to be respected.
    section: Server
    subsection: Bind
    order: 3
  shutdownGracePeriodMs:
    type: integer
    value: 10000
    description: Time (ms) to drain in-flight requests on SIGTERM before exit.
    section: Server
    subsection: Bind
    order: 4
    validation:
      min: 0
      max: 60000
  ingressPathHeader:
    type: string
    value: X-Ingress-Path
    description: >-
      Header carrying the HA ingress URL prefix. Only used when mode =
      homeassistant.
    section: Server
    subsection: Home Assistant
    order: 1
    conditional:
      field: mode
      value: homeassistant
  supervisorTokenEnv:
    type: string
    value: SUPERVISOR_TOKEN
    description: Env var containing the HA supervisor token (for HA API callbacks).
    section: Server
    subsection: Home Assistant
    order: 2
    conditional:
      field: mode
      value: homeassistant
ssl:
  enabled:
    type: boolean
    value: true
    description: Serve the management UI over HTTPS.
    section: Server
    subsection: TLS
    order: 1
  generate:
    type: boolean
    value: true
    description: Generate a self-signed cert on first run if certPath is missing.
    section: Server
    subsection: TLS
    order: 2
    depends_on: enabled
    show_when:
      - true
  certPath:
    type: string
    value: /etc/patchpanel/ssl/cert.pem
    description: Path to TLS certificate (PEM).
    section: Server
    subsection: TLS
    order: 3
    depends_on: enabled
    show_when:
      - true
  keyPath:
    type: string
    value: /etc/patchpanel/ssl/key.pem
    description: Path to TLS private key (PEM, mode 0600).
    section: Server
    subsection: TLS
    order: 4
    depends_on: enabled
    show_when:
      - true
  minVersion:
    type: select
    value: TLSv1.2
    options:
      - TLSv1.2
      - TLSv1.3
    description: Minimum TLS protocol version.
    section: Server
    subsection: TLS
    order: 5
    depends_on: enabled
    show_when:
      - true
  maxVersion:
    type: select
    value: TLSv1.3
    options:
      - TLSv1.2
      - TLSv1.3
    description: Maximum TLS protocol version.
    section: Server
    subsection: TLS
    order: 6
    depends_on: enabled
    show_when:
      - true
  ciphers:
    type: textarea
    value: >-
      ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    description: OpenSSL cipher list (ECDHE only by default).
    section: Server
    subsection: TLS
    order: 7
    depends_on: enabled
    show_when:
      - true
  honorCipherOrder:
    type: boolean
    value: true
    description: Server selects cipher from its own preference order.
    section: Server
    subsection: TLS
    order: 8
    depends_on: enabled
    show_when:
      - true
paths:
  state:
    type: string
    value: /var/lib/patchpanel/state.json
    description: Canonical HAProxy state document (renderer source).
    section: Paths
    subsection: Data
    order: 1
  audit:
    type: string
    value: /var/lib/patchpanel/audit.sqlite
    description: SQLite audit log (every state mutation).
    section: Paths
    subsection: Data
    order: 2
  snapshotsDir:
    type: string
    value: /var/lib/patchpanel/snapshots
    description: Time-machine state snapshots directory.
    section: Paths
    subsection: Data
    order: 3
  geoipDir:
    type: string
    value: /var/lib/patchpanel/geoip
    description: GeoIP MMDB store.
    section: Paths
    subsection: Data
    order: 4
  credentials:
    type: string
    value: /var/lib/patchpanel/credentials
    description: ACME account keys and DNS provider credentials.
    section: Paths
    subsection: Data
    order: 5
  options:
    type: string
    value: null
    description: |
      HA addon options.json path. Only set in HA-ingress mode where the
      supervisor mounts /data/options.json. null in standalone.
    section: Paths
    subsection: Data
    order: 6
  users:
    type: string
    value: /var/lib/patchpanel/users.json
    description: Local user accounts (bcrypt-hashed passwords). Mode 0600.
    section: Paths
    subsection: Data
    order: 7
  apiTokens:
    type: string
    value: /var/lib/patchpanel/api-tokens.json
    description: API tokens for programmatic access (bcrypt-hashed secrets). Mode 0600.
    section: Paths
    subsection: Data
    order: 8
  setupToken:
    type: string
    value: /etc/patchpanel/setup.token
    description: |
      One-time setup token file. Postinst generates this on fresh install;
      the first-run wizard consumes and deletes it after creating the
      initial admin user. Empty/missing after first run.
    section: Paths
    subsection: Data
    order: 9
  haproxyConfig:
    type: string
    value: /etc/haproxy/haproxy.cfg
    description: Where the rendered cfg is atomically swapped.
    section: Paths
    subsection: HAProxy
    order: 1
  haproxyCertsList:
    type: string
    value: /etc/haproxy/certs.list
    description: crt-list file referenced from `bind ssl`.
    section: Paths
    subsection: HAProxy
    order: 2
  haproxyCertsDir:
    type: string
    value: /etc/haproxy/certs
    description: Cert directory referenced from crt-list entries.
    section: Paths
    subsection: HAProxy
    order: 3
  haproxyMasterSocket:
    type: string
    value: /run/haproxy/master.sock
    description: HAProxy master CLI socket (used for reload).
    section: Paths
    subsection: HAProxy
    order: 4
  haproxyStatsSocket:
    type: string
    value: /run/haproxy/admin.sock
    description: HAProxy runtime API socket (live stats + per-server actions).
    section: Paths
    subsection: HAProxy
    order: 5
  haproxyPidFile:
    type: string
    value: /run/haproxy.pid
    description: HAProxy PID file (used by the systemctl control strategy).
    section: Paths
    subsection: HAProxy
    order: 6
  haproxyBin:
    type: string
    value: /usr/sbin/haproxy
    description: HAProxy binary (used for `haproxy -c` config validation).
    section: Paths
    subsection: HAProxy
    order: 7
  haproxyErrorPagesDir:
    type: string
    value: /var/lib/patchpanel/errors
    description: Custom HTTP error pages directory.
    section: Paths
    subsection: HAProxy
    order: 8
  haproxyMapsDir:
    type: string
    value: /etc/haproxy/maps
    description: HAProxy map-file directory (one .map per state.maps[] entry).
    section: Paths
    subsection: HAProxy
    order: 9
  keepalivedConfig:
    type: string
    value: /etc/keepalived/keepalived.conf
    description: Where the rendered keepalived.conf is atomically swapped.
    section: Paths
    subsection: Keepalived
    order: 1
  keepalivedPidFile:
    type: string
    value: /run/keepalived.pid
    description: Keepalived pid file (used by the direct/signal control strategy).
    section: Paths
    subsection: Keepalived
    order: 2
  keepalivedBin:
    type: string
    value: /usr/sbin/keepalived
    description: Keepalived binary (used for `keepalived -t -f` config validation).
    section: Paths
    subsection: Keepalived
    order: 3
  nodeConfig:
    type: string
    value: /etc/patchpanel/node.yaml
    description: |
      Per-node identity file. Carries this node's nodeId + per-VRRP-instance
      priority/state/interface overrides. Never synced between cluster peers;
      each node owns its own copy.
    section: Paths
    subsection: Cluster
    order: 1
  peersStore:
    type: string
    value: /etc/patchpanel/peers.json
    description: |
      Paired-peer relationships + their API tokens (mode 0600). Each entry
      records a peer's URL, name, and the token used for outbound peer-API
      calls. Never synced between nodes.
    section: Paths
    subsection: Cluster
    order: 2
  trustedCasDir:
    type: string
    value: /var/lib/patchpanel/trusted-cas
    description: Uploaded CA bundles (mTLS client validation, upstream verify).
    section: Paths
    subsection: Certificates
    order: 1
  trustedCrlsDir:
    type: string
    value: /var/lib/patchpanel/trusted-crls
    description: Uploaded CRLs (revocation lists for binds doing mTLS).
    section: Paths
    subsection: Certificates
    order: 2
  byoCertsDir:
    type: string
    value: /var/lib/patchpanel/certs/byo
    description: Bring-your-own PEM uploads (renewed externally).
    section: Paths
    subsection: Certificates
    order: 3
  luaPluginsDirs:
    type: array
    value:
      - /var/lib/patchpanel/lua-plugins
    description: |
      Whitelist of directories where the UI may upload Lua plugin source
      files. Users select from this list in the upload dialog; uploads
      outside these roots are rejected. Add more entries to expose
      additional safe locations (e.g. /etc/haproxy/lua-plugins).
    section: Paths
    subsection: Lua plugins
    order: 1
  letsencryptDir:
    type: string
    value: /etc/letsencrypt
    description: certbot account + cert store (standard layout).
    section: Paths
    subsection: Certificates
    order: 4
  letsencryptLog:
    type: string
    value: /var/log/letsencrypt/letsencrypt.log
    description: certbot log file (tailed by the live-logs SSE endpoint).
    section: Paths
    subsection: Certificates
    order: 5
  certbotBin:
    type: string
    value: /usr/bin/certbot
    description: certbot binary.
    section: Paths
    subsection: Certificates
    order: 6
  templatesDir:
    type: string
    value: /usr/share/patchpanel/templates
    description: Rendering templates (shipped read-only).
    section: Paths
    subsection: Internal
    order: 1
  webDir:
    type: string
    value: /opt/patchpanel/web/dist
    description: Built React frontend (served as static).
    section: Paths
    subsection: Internal
    order: 2
  webDirDebug:
    type: string
    value: /opt/patchpanel/web/dist-debug
    description: >-
      Development-mode React bundle (full error messages, prop-type warnings, no
      minification). Served instead of webDir when PATCHPANEL_DEBUG_UI=1 is set
      in the environment. Falls back to webDir if this directory is missing.
    section: Paths
    subsection: Internal
    order: 3
haproxy:
  reload:
    method:
      type: select
      value: master-socket
      options:
        - master-socket
        - systemctl
        - child-process
      description: How patchpanel reloads HAProxy after a config swap.
      section: HAProxy
      subsection: Reload
      order: 1
    hardStopAfter:
      type: string
      value: 30s
      description: Old worker drain deadline before forced termination.
      section: HAProxy
      subsection: Reload
      order: 2
    validateBeforeReload:
      type: boolean
      value: true
      description: Run `haproxy -c` against the rendered cfg before swapping.
      section: HAProxy
      subsection: Reload
      order: 3
    rollbackOnFailure:
      type: boolean
      value: true
      description: Restore previous cfg + reload if the new cfg fails validation.
      section: HAProxy
      subsection: Reload
      order: 4
renewal:
  schedule:
    type: string
    value: 5 8 * * 1,4
    description: Cron expression for the renewal scheduler (Mon/Thu 08:05 default).
    section: Certificates
    subsection: Renewal
    order: 1
  defaultPropagationSeconds:
    type: integer
    value: 120
    description: DNS-01 propagation wait (seconds) for new TXT records.
    section: Certificates
    subsection: Renewal
    order: 2
    validation:
      min: 0
      max: 3600
auth:
  strategy:
    type: select
    value: local
    options:
      - none
      - ha-ingress
      - local
    description: >
      Authentication strategy. local = local password (cookie session) + API
      tokens (bearer) — the default for Debian baremetal. ha-ingress = trust the
      HA supervisor proxy IP listed in server.trustProxy; users authenticate to
      Home Assistant upstream, requests through ingress are treated as admin.
      none = no auth (dev only — anyone with network access can read and modify
      state).
    section: Authentication
    subsection: Strategy
    order: 1
    required: true
security:
  jwtSecret:
    type: password
    value: __JWT_SECRET_FROM_FILE__
    description: |
      Session / JWT signing key. The configMigrator substitutes this placeholder
      on first run with the contents of /etc/patchpanel/.jwt-secret.
    section: Security
    subsection: Session / JWT
    order: 1
    required: true
  jwtExpiry:
    type: string
    value: 24h
    description: Token / session lifetime (e.g. 1h, 24h, 7d).
    section: Security
    subsection: Session / JWT
    order: 2
  sessionCookieName:
    type: string
    value: patchpanel.sid
    description: Session cookie name.
    section: Security
    subsection: Session / JWT
    order: 3
  sessionSecure:
    type: boolean
    value: true
    description: Send the session cookie only over HTTPS.
    section: Security
    subsection: Session / JWT
    order: 4
  sessionSameSite:
    type: select
    value: lax
    options:
      - lax
      - strict
      - none
    description: SameSite policy for the session cookie.
    section: Security
    subsection: Session / JWT
    order: 5
  bcryptRounds:
    type: integer
    value: 12
    description: bcrypt cost factor for passwords and API keys.
    section: Security
    subsection: Hashing
    order: 1
    validation:
      min: 10
      max: 15
  apiKeyEncryptEnabled:
    type: boolean
    value: false
    description: |
      Store the full plaintext API key encrypted with AES-256-CBC alongside
      the bcrypt hash (allows admin retrieval). Off by default.
    section: Security
    subsection: API Keys
    order: 1
  csrfEnabled:
    type: boolean
    value: true
    description: Enable lusca CSRF middleware on cookie-authenticated routes.
    section: Security
    subsection: CSRF
    order: 1
  helmetEnabled:
    type: boolean
    value: true
    description: Enable helmet middleware (CSP, HSTS, XFO, noSniff, referrerPolicy).
    section: Security
    subsection: Helmet
    order: 1
  hstsEnabled:
    type: boolean
    value: true
    description: Send Strict-Transport-Security header.
    section: Security
    subsection: Helmet
    order: 2
    depends_on: helmetEnabled
    show_when:
      - true
  hstsMaxAge:
    type: integer
    value: 31536000
    description: HSTS max-age in seconds (default 1 year).
    section: Security
    subsection: Helmet
    order: 3
    depends_on: hstsEnabled
    show_when:
      - true
  hstsIncludeSubdomains:
    type: boolean
    value: true
    description: Apply HSTS to all subdomains.
    section: Security
    subsection: Helmet
    order: 4
    depends_on: hstsEnabled
    show_when:
      - true
  hstsPreload:
    type: boolean
    value: false
    description: >-
      Include the preload directive (only enable after submission to
      hstspreload.org).
    section: Security
    subsection: Helmet
    order: 5
    depends_on: hstsEnabled
    show_when:
      - true
cors:
  enabled:
    type: boolean
    value: true
    description: >-
      Enable CORS middleware. Required for browser API clients on a different
      origin.
    section: CORS
    subsection: Policy
    order: 1
  whitelist:
    type: array
    value: []
    description: |
      Allowed origin URLs (exact match, no wildcards). Empty array
      means "same-origin only".
    section: CORS
    subsection: Policy
    order: 2
    depends_on: enabled
    show_when:
      - true
  credentials:
    type: boolean
    value: true
    description: Send Access-Control-Allow-Credentials (required for cookie auth).
    section: CORS
    subsection: Policy
    order: 3
    depends_on: enabled
    show_when:
      - true
rateLimit:
  authWindowMs:
    type: integer
    value: 900000
    description: Window (ms) for the auth-strict tier (login, password reset).
    section: Rate Limiting
    subsection: Auth (strict)
    order: 1
    validation:
      min: 60000
      max: 3600000
  authMax:
    type: integer
    value: 25
    description: Max requests per window for the auth tier.
    section: Rate Limiting
    subsection: Auth (strict)
    order: 2
    validation:
      min: 1
      max: 1000
  writeWindowMs:
    type: integer
    value: 60000
    description: Window (ms) for state-mutating endpoints.
    section: Rate Limiting
    subsection: Write
    order: 1
  writeMax:
    type: integer
    value: 60
    description: Max writes per window.
    section: Rate Limiting
    subsection: Write
    order: 2
  readWindowMs:
    type: integer
    value: 60000
    description: Window (ms) for read endpoints.
    section: Rate Limiting
    subsection: Read
    order: 1
  readMax:
    type: integer
    value: 1000
    description: Max reads per window.
    section: Rate Limiting
    subsection: Read
    order: 2
logging:
  directory:
    type: string
    value: /var/log/patchpanel
    description: >-
      Root for the per-category log files. Active files live at the top level
      (app.log, api.log, auth.log, error.log); daily rotations move to
      archive/<name>.log.YYYY-MM-DD[.N], then get gzipped past
      compression_age_days and pruned past max_files.
    section: Logging
    subsection: General
    order: 1
  console_enabled:
    type: boolean
    value: true
    description: >-
      Mirror log lines to stdout. journald captures stdout from the systemd
      unit, so this is also how `journalctl -fu patchpanel` works.
    section: Logging
    subsection: General
    order: 2
  performance_threshold_ms:
    type: integer
    value: 1000
    description: >-
      Operations slower than this trigger a warn-level emission on the app
      category (via createTimer()). 0 disables the threshold check.
    section: Logging
    subsection: General
    order: 3
    validation:
      min: 0
      max: 60000
  enable_compression:
    type: boolean
    value: true
    description: >-
      gzip rotated log files in archive/ once they age past
      compression_age_days.
    section: Logging
    subsection: Rotation
    order: 1
  compression_age_days:
    type: integer
    value: 7
    description: >-
      Days an archived log stays uncompressed before being gzipped. Lower values
      save disk; higher values keep recent rotations fast to grep.
    section: Logging
    subsection: Rotation
    order: 2
    validation:
      min: 0
      max: 365
  max_files:
    type: integer
    value: 30
    description: >-
      Max number of archived rotations to retain per category before the oldest
      get pruned.
    section: Logging
    subsection: Rotation
    order: 3
    validation:
      min: 1
      max: 3650
  categories:
    app:
      type: select
      value: info
      options:
        - silent
        - error
        - warn
        - info
        - debug
      description: Minimum level for the general application logger.
      section: Logging
      subsection: Categories
      order: 1
    api:
      type: select
      value: info
      options:
        - silent
        - error
        - warn
        - info
        - debug
      description: >-
        Minimum level for the per-request access logger (request started /
        completed / failed entries).
      section: Logging
      subsection: Categories
      order: 2
    auth:
      type: select
      value: info
      options:
        - silent
        - error
        - warn
        - info
        - debug
      description: Minimum level for authentication and authorization events.
      section: Logging
      subsection: Categories
      order: 3
  auditRetentionDays:
    type: integer
    value: 365
    description: Days of audit-log (SQLite) history to retain before vacuuming.
    section: Logging
    subsection: Audit
    order: 1
    validation:
      min: 30
      max: 3650
frontendLogging:
  enabled:
    type: boolean
    value: true
    description: |
      Master switch for the in-browser React UI logger. When off, the SPA's
      Logger.js silences every category and stops shipping unhandled errors to
      /api/client-errors. Leave on in production — the level controls below
      gate verbosity without losing error capture.
    section: Logging
    subsection: Frontend
    order: 1
  level:
    type: select
    value: info
    options:
      - trace
      - debug
      - info
      - warn
      - error
      - silent
    description: |
      Default level applied to every frontend category that has no explicit
      override below. Errors are always captured at error level via the
      ErrorBoundary + window listeners and shipped to /api/client-errors
      regardless of this setting (unless `enabled` is false).
    section: Logging
    subsection: Frontend
    order: 2
  categories:
    app:
      type: select
      value: info
      options:
        - trace
        - debug
        - info
        - warn
        - error
        - silent
      description: >-
        Override the level for log.app (generic UI plumbing — Layout, theme,
        routing).
      section: Logging
      subsection: Frontend Categories
      order: 1
    auth:
      type: select
      value: info
      options:
        - trace
        - debug
        - info
        - warn
        - error
        - silent
      description: >-
        Override the level for log.auth (login, logout, session probe, token
        CRUD, setup wizard).
      section: Logging
      subsection: Frontend Categories
      order: 2
    api:
      type: select
      value: info
      options:
        - trace
        - debug
        - info
        - warn
        - error
        - silent
      description: >-
        Override the level for log.api (API client wrappers, OpenAPI viewer,
        /api-docs page).
      section: Logging
      subsection: Frontend Categories
      order: 3
    state:
      type: select
      value: info
      options:
        - trace
        - debug
        - info
        - warn
        - error
        - silent
      description: >-
        Override the level for log.state (state.json reads/writes, snapshots,
        raw state).
      section: Logging
      subsection: Frontend Categories
      order: 4
    haproxy:
      type: select
      value: info
      options:
        - trace
        - debug
        - info
        - warn
        - error
        - silent
      description: >-
        Override the level for log.haproxy (HAProxy runtime control, stats
        sockets, server states).
      section: Logging
      subsection: Frontend Categories
      order: 5
    cert:
      type: select
      value: info
      options:
        - trace
        - debug
        - info
        - warn
        - error
        - silent
      description: >-
        Override the level for log.cert (Let's Encrypt, BYO certs, trusted CAs,
        CRLs).
      section: Logging
      subsection: Frontend Categories
      order: 6
    peer:
      type: select
      value: info
      options:
        - trace
        - debug
        - info
        - warn
        - error
        - silent
      description: >-
        Override the level for log.peer (cluster sync, peer pairing,
        keepalived/VRRP).
      section: Logging
      subsection: Frontend Categories
      order: 7
    error:
      type: select
      value: info
      options:
        - trace
        - debug
        - info
        - warn
        - error
        - silent
      description: >
        Override the level for log.error (ErrorBoundary + window.onerror +
        unhandledrejection capture).

        Raising this above `error` effectively disables error capture, so leave
        at `info` or lower

        unless you have a specific reason.
      section: Logging
      subsection: Frontend Categories
      order: 8
geoip:
  enabled:
    type: boolean
    value: false
    description: Enable GeoIP enrichment for the dashboard origin panels.
    section: GeoIP
    subsection: Database
    order: 1
  dbPath:
    type: string
    value: /var/lib/patchpanel/geoip/GeoLite2-City.mmdb
    description: Path to the MaxMind MMDB file.
    section: GeoIP
    subsection: Database
    order: 2
    depends_on: enabled
    show_when:
      - true
  fallbackProvider:
    type: select
    value: none
    options:
      - none
      - ip-api
      - ipinfo
    description: HTTP fallback when MMDB lookup misses.
    section: GeoIP
    subsection: Database
    order: 3
    depends_on: enabled
    show_when:
      - true
  updateSchedule:
    type: string
    value: 0 4 * * 0
    description: Cron expression for MMDB auto-update (default weekly Sun 04:00).
    section: GeoIP
    subsection: Database
    order: 4
    depends_on: enabled
    show_when:
      - true
i18n:
  default_locale:
    type: select
    value: en
    options:
      - en
    description: >-
      Locale used when neither query param nor Accept-Language matches a
      supported locale. Options auto-grow as locale JSON files are added under
      server/src/lib/locales/.
    section: Internationalization
    subsection: General
    order: 1
    required: true
  auto_detect:
    type: boolean
    value: true
    description: >-
      When on, honour ?lang= query param and Accept-Language headers. When off,
      every request uses default_locale regardless of what the client asks for.
    section: Internationalization
    subsection: General
    order: 2
  force_locale:
    type: string
    value: ''
    description: >-
      When set to a supported locale name, overrides every other source and pins
      all requests to it. Useful for screenshots and demos. Leave empty for
      normal behaviour.
    section: Internationalization
    subsection: General
    order: 3
