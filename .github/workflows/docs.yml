name: Publish Documentation

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Generate OpenAPI documentation
        run: |
          npm run generate-docs

      - name: Copy changelog and generate version info
        run: |
          # Generate version info JSON
          echo "{\"version\": \"${{ github.event.release.tag_name }}\", \"release_date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"release_url\": \"${{ github.event.release.html_url }}\"}" > docs/version.json

      - name: Stage repo-root markdown into Jekyll _includes
        run: |
          # docs/*.md uses {% include FOO.md %} for each canonical repo-root
          # markdown file. Jekyll resolves includes against docs/_includes,
          # so copy them in before the build.
          mkdir -p docs/_includes
          cp \
            ACKNOWLEDGMENTS.md \
            AUTHORS.md \
            CHANGELOG.md \
            CODE_OF_CONDUCT.md \
            CONTRIBUTING.md \
            LICENSE.md \
            SECURITY.md \
            SUPPORT.md \
            docs/_includes/

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        run: |
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
